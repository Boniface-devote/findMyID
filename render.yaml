services:
  # Python OCR Service (must be first so the URL is available)
  - type: web
    name: findmyid-ocr
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r mini-services/ocr-service/requirements.txt
    startCommand: cd mini-services/ocr-service && python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # Next.js Frontend
  - type: web
    name: findmyid-app
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: OCR_SERVICE_URL
        value: https://findmyid-ocr.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
